image: cdrx/pyinstaller-windows:python3 # 윈도우 빌드용 전용 이미지

pipelines:
  default:
    - step:
        name: "Build Windows EXE"
        caches:
          - pip
        script:
          # 1. 의존성 설치 (Wine 환경의 pip 사용)
          - pip install -r requirements.txt

          # 2. PyInstaller 실행
          # --clean 옵션은 빌드 꼬임을 방지합니다.
          - pyinstaller --onefile --noconsole --name "Review_Program" main.py
        artifacts:
          # 3. 빌드 결과물 저장 (dist 폴더의 모든 파일)
          - dist/**