name: Build Review Program EXE

# 어떤 상황에서 빌드를 실행할지 결정 (main 브랜치에 코드가 push될 때)
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest  # 윈도우 서버를 빌려옵니다.

    steps:
    - name: 코드를 가져옵니다
      uses: actions/checkout@v4

    - name: 파이썬(3.10)을 설치합니다
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 필요한 라이브러리를 설치합니다
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: EXE 파일로 빌드합니다
      run: |
        pyinstaller --onefile --noconsole --name "Review_Program" main.py

    - name: 결과물(Artifact)을 업로드합니다
      uses: actions/upload-artifact@v4
      with:
        name: Review_Program_Windows_EXE
        path: dist/Review_Program.exe  # 빌드된 파일이 저장된 경로