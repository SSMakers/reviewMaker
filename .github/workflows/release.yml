name: Release Review Program

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: "Release notes shown on GitHub Release"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  validate:
    name: Validate version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version.py
        id: version
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import re
          from pathlib import Path

          text = Path("version.py").read_text(encoding="utf-8")
          values = {}
          for name in ("MAJOR", "MINOR", "PATCH"):
              match = re.search(rf"{name}\s*=\s*(\d+)", text)
              if not match:
                  raise SystemExit(f"Missing Version.{name}")
              values[name.lower()] = match.group(1)

          version = f"{values['major']}.{values['minor']}.{values['patch']}"
          print(f"version={version}")
          print(f"tag=v{version}")
          PY

      - name: Ensure tag does not exist
        shell: bash
        run: |
          if git ls-remote --tags origin "${{ steps.version.outputs.tag }}" | grep -q "${{ steps.version.outputs.tag }}"; then
            echo "Tag ${{ steps.version.outputs.tag }} already exists."
            exit 1
          fi

  build:
    name: Build ${{ matrix.os }}
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    env:
      APP_VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Create .env
        shell: bash
        run: |
          echo "${{ secrets.ENV_FILE }}" > .env

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows executable
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          pyinstaller --onedir --noconsole --name "Review_Program" --add-data ".env;." --add-data "certs;certs" main.py

      - name: Build Windows installer
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          iscc /DAPP_VERSION=$env:APP_VERSION .github\installer\ReviewWriter.iss

      - name: Build macOS app
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          pyinstaller --onedir --windowed --name "Review_Program" --add-data ".env:." --add-data "certs:certs" main.py
          cd dist
          ditto --norsrc -c -k --keepParent "Review_Program.app" "Review_Program_${APP_VERSION}_macOS.zip"

      - name: Upload Windows release asset
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: dist/ReviewWriterSetup_${{ env.APP_VERSION }}.exe

      - name: Upload macOS release asset
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: dist/Review_Program_${{ env.APP_VERSION }}_macOS.zip

  release:
    name: Create draft release
    needs: [validate, build]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.validate.outputs.version }}
      TAG: ${{ needs.validate.outputs.tag }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Prepare release files
        shell: bash
        run: |
          mkdir -p release
          cp release-assets/release-windows/ReviewWriterSetup_${VERSION}.exe release/
          cp release-assets/release-macos/Review_Program_${VERSION}_macOS.zip release/
          cd release
          sha256sum * > checksums.txt
          cat > latest.json <<JSON
          {
            "version": "${VERSION}",
            "published_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "windows": {
              "url": "https://github.com/${{ github.repository }}/releases/download/${TAG}/ReviewWriterSetup_${VERSION}.exe",
              "sha256": "$(sha256sum ReviewWriterSetup_${VERSION}.exe | awk '{print $1}')",
              "kind": "installer"
            },
            "macos": {
              "url": "https://github.com/${{ github.repository }}/releases/download/${TAG}/Review_Program_${VERSION}_macOS.zip",
              "sha256": "$(sha256sum Review_Program_${VERSION}_macOS.zip | awk '{print $1}')",
              "kind": "app_bundle"
            },
            "release_notes_url": "https://github.com/${{ github.repository }}/releases/tag/${TAG}"
          }
          JSON

      - name: Create GitHub Release
        shell: bash
        run: |
          NOTES="${{ inputs.release_notes }}"
          if [ -z "$NOTES" ]; then
            NOTES="Review Writer ${TAG}"
          fi
          gh release create "$TAG" release/* \
            --title "$TAG" \
            --notes "$NOTES" \
            --draft

      - name: Next step
        shell: bash
        run: |
          echo "Draft release ${TAG} was created."
          echo "Review it on GitHub and click Publish release to update GitHub Pages/latest.json."
